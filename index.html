<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Live IndoFinity</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent; /* Membuat latar belakang tembus pandang */
        }

        /* Mengatur layout grid untuk 4 widget IndoFinity */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Kolom */
            grid-template-rows: 1fr 1fr;    /* 2 Baris */
            width: 100vw;
            height: 100vh;
            gap: 10px; /* Jarak antar widget agar tidak mepet */
            padding: 10px;
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent; 
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <iframe src="https://widgets.indofinity.com/widgets/overlay/d0fa5c1f-37e0-4e15-bdc8-3b462738c48c?screen=1"></iframe>
        <iframe src="https://widgets.indofinity.com/widgets/overlay/d0fa5c1f-37e0-4e15-bdc8-3b462738c48c?screen=2"></iframe>
        <iframe src="https://widgets.indofinity.com/widgets/likes/d0fa5c1f-37e0-4e15-bdc8-3b462738c48c"></iframe>
        <iframe src="https://widgets.indofinity.com/widgets/youtube/d0fa5c1f-37e0-4e15-bdc8-3b462738c48c"></iframe>
    </div>

</body>
</html>
